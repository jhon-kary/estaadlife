<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث الاحترافي</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .video-wrapper { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* طبقة الشعار والنص */
        .overlay { position: absolute; top: 20px; right: 20px; z-index: 10; pointer-events: none; }
        .logo { width: 60px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.7)); }
        
        .error-message { 
            position: absolute; color: white; text-align: center; display: none; 
            background: rgba(255,0,0,0.2); padding: 20px; border-radius: 10px; border: 1px solid red;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <div class="overlay">
        <img class="logo" src="https://i.ibb.co/tw3d04F2/cropped-transparent-300x300.png" alt="logo">
    </div>

    <video id="video" controls autoplay muted playsinline></video>
    
    <div id="error" class="error-message">
        ⚠️ تعذر تشغيل البث تلقائياً بسبب قيود المتصفح.<br>
        <button onclick="location.reload()" style="margin-top:10px; padding:10px; cursor:pointer;">إعادة محاولة الاتصال</button>
    </div>
</div>

<script>
    const streamUrl = "http://xc-vip.xyz:80/live/25393575/37315228/23542eca-3c90-4356-a23b-95fb44ce7fe8.m3u8"; // جرب إضافة 8 هنا
    const video = document.getElementById('video');
    const errorDiv = document.getElementById('error');

    if (Hls.isSupported()) {
        const hls = new Hls({
            // إعدادات قوية لتخطي مشاكل السيرفر
            xhrSetup: function(xhr, url) {
                xhr.withCredentials = false; 
            },
            manifestLoadingMaxRetry: 10,
            levelLoadingMaxRetry: 10
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().catch(() => {
                console.log("يجب التفاعل مع الصفحة للتشغيل");
            });
        });

        hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                switch(data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        hls.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        hls.recoverMediaError();
                        break;
                    default:
                        errorDiv.style.display = 'block';
                        break;
                }
            }
        });
    } 
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // دعم متصفح Safari
        video.src = streamUrl;
    }
</script>

</body>
</html>
