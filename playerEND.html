<script>
    // ⚠️ مهم: استخدم متغير للرابط يسهل تعديله
    const ORIGINAL_STREAM = "http://darpro4k.com:8080/live/d003dfff0e23/khrVgdORfeyPVH/557474.m3u8";
    
    // 🔁 حاول استخدام البرووكسي أولاً إذا كان متاحاً
    const PROXY_URL = "https://YOUR-WORKER.workers.dev/stream/"; // سننشئه لاحقاً
    
    // دالة لتشفير رابط البث للبروكسي
    function encodeStreamKey(url, referer = "") {
        const obj = { directUrl: url, referer: referer };
        return btoa(JSON.stringify(obj))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }
    
    // تحديد الرابط النهائي
    let streamUrl = ORIGINAL_STREAM;
    
    // إذا كان المتصفح يرفض المحتوى المختلط، استخدم البرووكسي
    if (window.location.protocol === "https:" && ORIGINAL_STREAM.startsWith("http:")) {
        try {
            const key = encodeStreamKey(ORIGINAL_STREAM, window.location.origin);
            streamUrl = PROXY_URL + key;
            console.log("Using proxy:", streamUrl);
        } catch(e) {
            console.warn("Proxy failed, trying direct:", e);
        }
    }
    
    // ... بقية كود hls.js كما هو مع استخدام streamUrl
</script>
