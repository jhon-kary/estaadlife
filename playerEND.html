<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: sans-serif; }
        .container { width: 100%; max-width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .loading { color: white; text-align: center; padding: 20px; }
        .error { color: #ff4444; background: rgba(255,0,0,0.1); padding: 15px; border-radius: 8px; margin: 20px; }
    </style>
</head>
<body>

<div class="container">
    <video id="video" controls autoplay muted playsinline></video>
    <div id="status" class="loading">جاري التحميل...</div>
</div>

<script>
    // ⚠️ ضع رابط Worker الخاص بك هنا
    const WORKER_URL = 'https://estaadlife.jhon-kary7.workers.dev';
    
    // رابط البث الأصلي (HTTP)
    const ORIGINAL_STREAM = 'http://darpro4k.com:8080/live/d003dfff0e23/khrVgdORfeyPVH/557474.m3u8';
    
    // إنشاء رابط البرووكسي
    const streamUrl = `${WORKER_URL}?url=${encodeURIComponent(ORIGINAL_STREAM)}`;
    
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    
    function initPlayer() {
        if (Hls.isSupported()) {
            const hls = new Hls({
                debug: false,
                enableWorker: true,
                lowLatencyMode: false,
                backBufferLength: 90,
                manifestLoadingMaxRetry: 5,
                levelLoadingMaxRetry: 5
            });
            
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                status.style.display = 'none';
                video.play().catch(e => {
                    console.log('Auto-play prevented:', e);
                    status.textContent = 'اضغط على الفيديو للتشغيل';
                    status.style.display = 'block';
                });
            });
            
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            status.textContent = 'خطأ في الشبكة - جاري إعادة المحاولة...';
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            status.textContent = 'خطأ في الوسائط - جاري الإصلاح...';
                            hls.recoverMediaError();
                            break;
                        default:
                            status.innerHTML = '<div class="error">⚠️ تعذر تحميل البث<br>تحقق من اتصالك وحاول مجدداً</div>';
                            break;
                    }
                }
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                status.style.display = 'none';
                video.play();
            });
        }
    }
    
    // بدء المشغل
    initPlayer();
</script>

</body>
</html>
